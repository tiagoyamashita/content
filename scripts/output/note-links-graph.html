ew.md", "target": "en/swe101/git/essentials/i-overview.md", "label": "Overview"}, {"source": "en/swe101/obsidian/i-overview.md", "target": "en/swe101/languages&frameworks/mermaid/i-overview.md", "label": "Overview"}, {"source": "en/swe101/obsidian/i-overview.md", "target": "en/swe101/languages&frameworks/plantuml/i-overview.md", "label": "Overview"}, {"source": "en/swe101/obsidian/i-overview.md", "target": "en/swe101/obsidian/ii-install-and-vault-setup.md", "label": "[` autocomplete builds a web of concepts and runbooks |\n| **Offline** | No account required; works on a plane or in a locked-down network |\n| **Extensible** | Community plugins for Git, Dataview, Excalidraw, linting |\n| **Low ceremony** | Start with one folder and a daily note — no database setup |\n\n## Obsidian vs other options\n\n| Tool | Strength | Trade-off |\n|------|----------|-----------|\n| **Obsidian** | Local Markdown + graph + plugins | Sync and mobile need setup (Git, Obsidian Sync, etc.) |\n| **Notion** | Rich databases, sharing, comments | Hosted; export and offline weaker |\n| **Confluence / wiki** | Team permissions, enterprise search | Heavy; not ideal for personal scratch notes |\n| **VS Code + folder** | Already in the editor | No backlinks graph or note-centric UX out of the box |\n| **Logseq** | Outliner-first, also local Markdown | Different mental model (blocks vs pages) |\n\n**Rule of thumb:** use **Obsidian** when you want **your own** Markdown corpus with **links and plugins**, especially if you already sync docs with **Git**. Use a **hosted wiki** when non-technical stakeholders need permissions and search without cloning a repo.\n\n## When Obsidian fits\n\n| Good fit | Poor default |\n|----------|--------------|\n| Personal engineering notebook | Company-wide source of truth with strict ACLs alone |\n| ADRs, design notes, learning logs | Real-time collaborative doc editing (Google Docs style) |\n| Vault synced via Git next to code | Replacing production monitoring or ticket systems |\n| Offline or air-gapped documentation | Notes that must only live in a SaaS with no local copy |\n\n## Next\n\nContinue with [Install & vault setup"}, {"source": "en/swe101/obsidian/ii-install-and-vault-setup.md", "target": "en/swe101/obsidian/vii-engineering-workflows.md", "label": "Engineering workflows"}, {"source": "en/swe101/obsidian/ii-install-and-vault-setup.md", "target": "en/swe101/obsidian/iii-markdown-and-editing.md", "label": "Markdown & editing"}, {"source": "en/swe101/obsidian/iii-markdown-and-editing.md", "target": "en/swe101/languages&frameworks/mermaid/i-overview.md", "label": "Overview"}, {"source": "en/swe101/obsidian/iii-markdown-and-editing.md", "target": "en/sre101/cicd/tools-and-platforms/v-docker-in-ci.md", "label": "Docker in CI"}, {"source": "en/swe101/obsidian/iii-markdown-and-editing.md", "target": "en/swe101/obsidian/ii-install-and-vault-setup.md", "label": "Install & vault setup"}, {"source": "en/swe101/obsidian/iii-markdown-and-editing.md", "target": "en/getting-started/guide-topics-and-folders.md", "label": "Topics and folders"}, {"source": "en/swe101/obsidian/iii-markdown-and-editing.md", "target": "en/swe101/obsidian/iv-links-graph-and-tags.md", "label": "Links, graph & tags"}, {"source": "en/swe101/obsidian/iv-links-graph-and-tags.md", "target": "en/swe101/obsidian/v-plugins-and-customization.md", "label": "Plugins & customization"}, {"source": "en/swe101/obsidian/v-plugins-and-customization.md", "target": "en/swe101/obsidian/vi-git-sync-and-team-workflows.md", "label": "Git sync & team workflows"}, {"source": "en/swe101/obsidian/v-plugins-and-customization.md", "target": "en/swe101/git/essentials/viii-secrets-and-sensitive-files-in-history.md", "label": "Secrets in history"}, {"source": "en/swe101/obsidian/vi-git-sync-and-team-workflows.md", "target": "en/swe101/git/essentials/iii-everyday-commands.md", "label": "Everyday commands"}, {"source": "en/swe101/obsidian/vi-git-sync-and-team-workflows.md", "target": "en/swe  {"source": "en/cryptocurrency101/ix-verify-safe-and-completed.md", "target": "en/cryptocurrency101/networks/tron/i-overview.md", "label": "Tron"}, {"source": "en/cryptocurrency101/ix-verify-safe-and-completed.md", "target": "en/cryptocurrency101/networks/ton/i-overview.md", "label": "TON"}, {"source": "en/cryptocurrency101/ix-verify-safe-and-completed.md", "target": "en/cryptocurrency101/networks/ada/i-overview.md", "label": "Cardano"}, {"source": "en/cryptocurrency101/ix-verify-safe-and-completed.md", "target": "en/cryptocurrency101/vii-failed-transactions-and-funds.md", "label": "Failed transactions & funds"}, {"source": "en/startups/free-services/i-overview.md", "target": "en/startups/free-services/ii-email-and-mailing.md", "label": "Email & mailing"}, {"source": "en/startups/free-services/i-overview.md", "target": "en/startups/free-services/iii-hosting-domains-and-cdn.md", "label": "Hosting, domains & CDN"}, {"source": "en/startups/free-services/i-overview.md", "target": "en/startups/free-services/iv-database-auth-and-storage.md", "label": "Database, auth & storage"}, {"source": "en/startups/free-services/i-overview.md", "target": "en/startups/free-services/v-monitoring-analytics-and-devtools.md", "label": "Monitoring, analytics & devtools"}, {"source": "en/startups/free-services/ii-email-and-mailing.md", "target": "en/startups/free-services/iii-hosting-domains-and-cdn.md", "label": "Hosting, domains & CDN"}, {"source": "en/startups/free-services/iii-hosting-domains-and-cdn.md", "target": "en/startups/free-services/ii-email-and-mailing.md", "label": "Email & mailing"}, {"source": "en/startups/i-overview.md", "target": "en/startups/free-services/i-overview.md", "label": "Overview"}]}</script>
<script>
(() => {
  const DATA = JSON.parse(document.getElementById("graph-data").textContent);
  const canvas = document.getElementById("c");
  const ctx = canvas.getContext("2d");
  const detail = document.getElementById("detail");
  const legendEl = document.getElementById("legend");
  const q = document.getElementById("q");
  const trackSel = document.getElementById("track");
  const orphans = document.getElementById("orphans");
  const areas = document.getElementById("areas");
  const labels = document.getElementById("labels");

  const TRACK_TITLES = {
    "ai101": "AI101",
    "swe101": "SWE101",
    "sre101": "SRE101",
    "cs101": "CS101",
    "cybersecurity": "Cybersecurity",
    "digital-marketing": "Digital marketing",
    "cryptocurrency101": "Cryptocurrency101",
    "startups": "Startups",
    "food": "Food",
    "languages": "Languages",
    "getting-started": "Getting started",
  };
  function trackTitle(t) {
    if (!t) return "Other";
    return TRACK_TITLES[t] || t.replace(/-/g, " ").replace(/\b\w/g, c => c.toUpperCase());
  }

  const tracks = [...new Set(DATA.nodes.map(n => n.track).filter(Boolean))].sort();
  for (const t of tracks) {
    const o = document.createElement("option");
    o.value = t; o.textContent = trackTitle(t);
    trackSel.appendChild(o);
  }

  const palette = [
    "#0f766e","#b45309","#1d4ed8","#be123c","#7c3aed",
    "#047857","#c2410c","#0369a1","#a16207","#4f46e5",
    "#0e7490","#9f1239","#15803d","#854d0e","#6d28d9"
  ];
  const trackColor = {};
  tracks.forEach((t,i) => trackColor[t] = palette[i % palette.length]);

  function hexToRgba(hex, a) {
    const h = hex.replace("#","");
    const n = parseInt(h.length === 3 ? h.split("").map(c=>c+c).join("") : h, 16);
    const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
    return `rgba(${r},${g},${b},${a})`;
  }

  legendEl.innerHTML = tracks.map(t =>
    `<div style="display:flex;gap:.4rem;align-items:center;margin:.15rem 0">
      <span style="width:.7rem;height:.7rem;border-radius:2px;background:${trackColor[t]};opacity:.55"></span>
      ${trackTitle(t)}
    </div>`
  ).join("");

  // Fixed hubs around a ring so each top folder owns a region
  const trackHub = {};
  tracks.forEach((t, i) => {
    const ang = (i / Math.max(tracks.length, 1)) * Math.PI * 2 - Math.PI / 2;
    const radius = 420;
    trackHub[t] = { x: Math.cos(ang) * radius, y: Math.sin(ang) * radius };
  });

  let width = 0, height = 0, dpr = 1;
  let transform = { x: 0, y: 0, k: 1 };
  let nodes = [], links = [];
  let simNodes = [], simLinks = [];
  let selected = null;
  let hover = null;
  let dragging = null;
  let panning = false;
  let lastPan = null;

  function resize() {
    dpr = window.devicePixelRatio || 1;
    const rect = canvas.parentElement.getBoundingClientRect();
    width = rect.width; height = rect.height;
    canvas.width = Math.floor(width * dpr);
    canvas.height = Math.floor(height * dpr);
    canvas.style.width = width + "px";
    canvas.style.height = height + "px";
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function matchesFilter(n) {
    if (!orphans.checked && n.degree === 0) return false;
    if (trackSel.value && n.track !== trackSel.value) return false;
    const s = q.value.trim().toLowerCase();
    if (!s) return true;
    return [n.title, n.group, n.path, n.subtitle, n.label, n.track].filter(Boolean)
      .some(v => String(v).toLowerCase().includes(s));
  }

  function rebuild() {
    const visible = new Set(DATA.nodes.filter(matchesFilter).map(n => n.id));
    nodes = DATA.nodes.filter(n => visible.has(n.id));
    links = DATA.edges.filter(e => visible.has(e.source) && visible.has(e.target));
    simNodes = nodes.map(n => {
      const hub = trackHub[n.track] || { x: 0, y: 0 };
      return {
        ...n,
        x: hub.x + (Math.random() - .5) * 160,
        y: hub.y + (Math.random() - .5) * 160,
        vx: 0, vy: 0,
        r: 4 + Math.min(10, Math.sqrt(n.degree || 0) * 1.8),
      };
    });
    const simById = Object.fromEntries(simNodes.map(n => [n.id, n]));
    simLinks = links.map(e => ({
      source: simById[e.source],
      target: simById[e.target],
      label: e.label,
    })).filter(e => e.source && e.target);
  }

  function tick() {
    const alpha = 0.08;
    // repulsion (stronger across tracks)
    for (let i = 0; i < simNodes.length; i++) {
      for (let j = i + 1; j < simNodes.length; j++) {
        const a = simNodes[i], b = simNodes[j];
        let dx = a.x - b.x, dy = a.y - b.y;
        let dist2 = dx*dx + dy*dy || 0.01;
        let dist = Math.sqrt(dist2);
        const same = a.track === b.track;
        let force = (same ? 520 : 1400) / dist2;
        let fx = dx / dist * force, fy = dy / dist * force;
        a.vx += fx; a.vy += fy; b.vx -= fx; b.vy -= fy;
      }
    }
    // link springs (weaker across tracks so areas stay coherent)
    for (const e of simLinks) {
      const a = e.source, b = e.target;
      let dx = b.x - a.x, dy = b.y - a.y;
      let dist = Math.sqrt(dx*dx + dy*dy) || 0.01;
      const same = a.track === b.track;
      let desired = same ? 70 : 220;
      let force = (dist - desired) * (same ? 0.025 : 0.008);
      let fx = dx / dist * force, fy = dy / dist * force;
      a.vx += fx; a.vy += fy; b.vx -= fx; b.vy -= fy;
    }
    // pull each note toward its top-folder hub
    for (const n of simNodes) {
      if (n === dragging) continue;
      const hub = trackHub[n.track];
      if (hub) {
        n.vx += (hub.x - n.x) * 0.012;
        n.vy += (hub.y - n.y) * 0.012;
      }
      n.vx += -n.x * 0.0008;
      n.vy += -n.y * 0.0008;
      n.vx *= 0.84; n.vy *= 0.84;
      n.x += n.vx * alpha * 12;
      n.y += n.vy * alpha * 12;
    }
  }

  function cross(o, a, b) {
    return (a.x - o.x) * (b.y - o.y) - (a.y - o.y) * (b.x - o.x);
  }

  function convexHull(pts) {
    if (pts.length < 3) return pts.slice();
    const sorted = pts.slice().sort((a,b) => a.x === b.x ? a.y - b.y : a.x - b.x);
    const lower = [];
    for (const p of sorted) {
      while (lower.length >= 2 && cross(lower[lower.length-2], lower[lower.length-1], p) <= 0) lower.pop();
      lower.push(p);
    }
    const upper = [];
    for (let i = sorted.length - 1; i >= 0; i--) {
      const p = sorted[i];
      while (upper.length >= 2 && cross(upper[upper.length-2], upper[upper.length-1], p) <= 0) upper.pop();
      upper.push(p);
    }
    upper.pop(); lower.pop();
    return lower.concat(upper);
  }

  function paddedHull(members, pad) {
    if (!members.length) return [];
    const cx = members.reduce((s,n)=>s+n.x,0) / members.length;
    const cy = members.reduce((s,n)=>s+n.y,0) / members.length;
    const expanded = members.map(n => {
      const dx = n.x - cx, dy = n.y - cy;
      const d = Math.sqrt(dx*dx + dy*dy) || 1;
      const extra = pad + n.r;
      return { x: n.x + (dx / d) * extra, y: n.y + (dy / d) * extra };
    });
    // also pad single / pair with ring points
    if (members.length < 3) {
      for (const n of members) {
        for (let i = 0; i < 8; i++) {
          const a = (i / 8) * Math.PI * 2;
          expanded.push({ x: n.x + Math.cos(a) * (pad + 28), y: n.y + Math.sin(a) * (pad + 28) });
        }
      }
    }
    return convexHull(expanded);
  }

  function drawAreas() {
    if (!areas.checked) return;
    const byTrack = {};
    for (const n of simNodes) {
      const t = n.track || "other";
      (byTrack[t] ||= []).push(n);
    }
    for (const [t, members] of Object.entries(byTrack)) {
      if (members.length < 1) continue;
      const hull = paddedHull(members, 36);
      if (hull.length < 3) continue;
      const color = trackColor[t] || "#78716c";
      ctx.beginPath();
      ctx.moveTo(hull[0].x, hull[0].y);
      for (let i = 1; i < hull.length; i++) ctx.lineTo(hull[i].x, hull[i].y);
      ctx.closePath();
      ctx.fillStyle = hexToRgba(color, 0.14);
      ctx.fill();
      ctx.strokeStyle = hexToRgba(color, 0.45);
      ctx.lineWidth = 1.5 / transform.k;
      ctx.setLineDash([6 / transform.k, 5 / transform.k]);
      ctx.stroke();
      ctx.setLineDash([]);

      const cx = members.reduce((s,n)=>s+n.x,0) / members.length;
      const cy = members.reduce((s,n)=>s+n.y,0) / members.length;
      const title = trackTitle(t);
      const fontPx = Math.max(14, 18 / Math.sqrt(transform.k));
      ctx.font = `650 ${fontPx}px "IBM Plex Sans", sans-serif`;
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      const tw = ctx.measureText(title).width;
      const padX = 10 / transform.k, padY = 6 / transform.k;
      ctx.fillStyle = "rgba(255,253,248,.82)";
      ctx.strokeStyle = hexToRgba(color, 0.35);
      ctx.lineWidth = 1 / transform.k;
      const bw = tw + padX * 2, bh = fontPx + padY * 2;
      const bx = cx - bw / 2, by = cy - bh / 2 - 8 / transform.k;
      const r = 4 / transform.k;
      ctx.beginPath();
      if (ctx.roundRect) {
        ctx.roundRect(bx, by, bw, bh, r);
      } else {
        ctx.rect(bx, by, bw, bh);
      }
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = color;
      ctx.fillText(title, cx, by + bh / 2);
      ctx.textAlign = "start";
      ctx.textBaseline = "alphabetic";
    }
  }

  function screenToWorld(sx, sy) {
    return {
      x: (sx - transform.x) / transform.k,
      y: (sy - transform.y) / transform.k,
    };
  }

  function findNode(sx, sy) {
    const w = screenToWorld(sx, sy);
    let best = null, bestD = Infinity;
    for (const n of simNodes) {
      const dx = n.x - w.x, dy = n.y - w.y;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d < n.r + 6 / transform.k && d < bestD) { best = n; bestD = d; }
    }
    return best;
  }

  function draw() {
    ctx.clearRect(0, 0, width, height);
    ctx.save();
    ctx.translate(transform.x, transform.y);
    ctx.scale(transform.k, transform.k);

    drawAreas();

    const neighbor = new Set();
    if (selected) {
      neighbor.add(selected.id);
      for (const e of simLinks) {
        if (e.source.id === selected.id) neighbor.add(e.target.id);
        if (e.target.id === selected.id) neighbor.add(e.source.id);
      }
    }

    for (const e of simLinks) {
      const dim = selected && !(neighbor.has(e.source.id) && neighbor.has(e.target.id));
      const cross = e.source.track !== e.target.track;
      ctx.beginPath();
      ctx.moveTo(e.source.x, e.source.y);
      ctx.lineTo(e.target.x, e.target.y);
      ctx.strokeStyle = dim ? "rgba(120,113,108,.10)"
        : (cross ? "rgba(68,64,60,.22)" : "rgba(68,64,60,.40)");
      ctx.lineWidth = (selected && !dim ? 1.6 : 1) / transform.k;
      ctx.stroke();
    }

    for (const n of simNodes) {
      const dim = selected && !neighbor.has(n.id);
      const isSel = selected && selected.id === n.id;
      const isHover = hover && hover.id === n.id;
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
      ctx.fillStyle = dim ? "rgba(168,162,158,.35)" : (trackColor[n.track] || "#57534e");
      ctx.fill();
      if (isSel || isHover) {
        ctx.strokeStyle = "#1c1917";
        ctx.lineWidth = 2 / transform.k;
        ctx.stroke();
      }
      if (labels.checked && (transform.k > 0.85 || isSel || isHover || n.degree >= 5)) {
        ctx.fillStyle = dim ? "rgba(120,113,108,.5)" : "#1c1917";
        ctx.font = `${11 / transform.k}px "IBM Plex Sans", sans-serif`;
        ctx.fillText(n.title, n.x + n.r + 4 / transform.k, n.y + 3 / transform.k);
      }
    }
    ctx.restore();
  }

  function showDetail(n) {
    if (!n) { detail.innerHTML = "<em>Click a note</em>"; return; }
    detail.innerHTML = `<strong>${escapeHtml(n.title)}</strong>
      <div>${escapeHtml(n.group || "")} · <strong>${escapeHtml(trackTitle(n.track))}</strong></div>
      <div>degree ${n.degree} · order ${n.order ?? "—"}</div>
      <code>${escapeHtml(n.path)}</code>`;
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
  }

  function loop() {
    tick();
    draw();
    requestAnimationFrame(loop);
  }

  canvas.addEventListener("wheel", (ev) => {
    ev.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const sx = ev.clientX - rect.left, sy = ev.clientY - rect.top;
    const before = screenToWorld(sx, sy);
    const factor = Math.exp(-ev.deltaY * 0.0015);
    transform.k = Math.min(4, Math.max(0.12, transform.k * factor));
    transform.x = sx - before.x * transform.k;
    transform.y = sy - before.y * transform.k;
  }, { passive: false });

  canvas.addEventListener("pointerdown", (ev) => {
    const rect = canvas.getBoundingClientRect();
    const sx = ev.clientX - rect.left, sy = ev.clientY - rect.top;
    const hit = findNode(sx, sy);
    if (hit) {
      dragging = hit;
      selected = hit;
      showDetail(hit);
      canvas.setPointerCapture(ev.pointerId);
    } else {
      panning = true;
      lastPan = { x: ev.clientX, y: ev.clientY };
      canvas.classList.add("dragging");
      canvas.setPointerCapture(ev.pointerId);
    }
  });
  canvas.addEventListener("pointermove", (ev) => {
    const rect = canvas.getBoundingClientRect();
    const sx = ev.clientX - rect.left, sy = ev.clientY - rect.top;
    if (dragging) {
      const w = screenToWorld(sx, sy);
      dragging.x = w.x; dragging.y = w.y;
      dragging.vx = 0; dragging.vy = 0;
    } else if (panning && lastPan) {
      transform.x += ev.clientX - lastPan.x;
      transform.y += ev.clientY - lastPan.y;
      lastPan = { x: ev.clientX, y: ev.clientY };
    } else {
      hover = findNode(sx, sy);
    }
  });
  canvas.addEventListener("pointerup", () => {
    dragging = null; panning = false; lastPan = null;
    canvas.classList.remove("dragging");
  });

  function resetView() {
    transform = { x: width / 2, y: height / 2, k: 0.55 };
  }

  document.getElementById("reset").onclick = resetView;
  document.getElementById("reheat").onclick = () => {
    for (const n of simNodes) { n.vx += (Math.random()-.5)*8; n.vy += (Math.random()-.5)*8; }
  };
  for (const el of [q, trackSel, orphans]) {
    el.addEventListener("input", () => { rebuild(); });
    el.addEventListener("change", () => { rebuild(); });
  }
  // areas/labels only affect drawing — do not reset layout

  window.addEventListener("resize", () => { resize(); });
  resize();
  rebuild();
  resetView();
  loop();
})();
</script>
</body>
</html>
